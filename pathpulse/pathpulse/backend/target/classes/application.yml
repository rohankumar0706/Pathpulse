spring:
  application:
    name: pathpulse-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pathpulse}
    username: ${SPRING_DATASOURCE_USERNAME:pathpulse}
    password: ${SPRING_DATASOURCE_PASSWORD:pathpulse_secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:redis_secret}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: pathpulse-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.pathpulse.dto"

server:
  port: 8080
  compression:
    enabled: true
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:default_secret_change_in_production_min_32_chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  refresh-expiration-ms: 604800000

pathpulse:
  kafka:
    topics:
      gps-updates: pathpulse.gps.updates
      journey-events: pathpulse.journey.events
      notifications: pathpulse.notifications
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.pathpulse: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
